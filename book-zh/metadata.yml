abstract: |
  基于人类反馈的强化学习（RLHF）已经成为大规模构建最新机器学习系统的关键工具。
  围绕 RLHF 核心方法发展起来的领域，如今已经扩展为更广泛的后训练技术体系。
  本书面向具备一定定量背景的读者，围绕经典 RLHF 流程，系统介绍模型后训练的核心方法。
  本书首先解释 RLHF 做什么、为什么会出现，以及这一年轻领域中的关键技术里程碑，并补充理解全书所需的强化学习背景。
  全书主体详细讲解 RLHF 中每个优化阶段：从指令微调开始，到训练奖励模型，再到拒绝采样、强化学习、on-policy 蒸馏和直接对齐算法。
  本书也讨论更广泛的主题，包括 RLHF 在近期文献中的来源，以及它与经济学、哲学和最优控制等不同科学领域的交汇。
  本书最后讨论合成数据、工具使用、角色训练和评估等尚未充分研究或正在兴起的高级话题，以及该领域的开放问题。
  本书还配套发布多种资源，包括用于后训练语言模型基础概念学习的 [codebase](https://rlhfbook.com/code)、用于比较模型在不同后训练阶段补全结果的 [library](https://rlhfbook.com/library)，以及教学 [course](https://rlhfbook.com/course)。
