name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
    paths:
      - "book/**"
      - "teach/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/static.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "book/**"
      - "teach/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/static.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Course-only changes (teach/** and the course page template) skip the
      # slow PDF/EPUB/TeX path and reuse the published book artifacts instead.
      # If this step is skipped (workflow_dispatch), outputs are empty and the
      # full build runs.
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            book:
              - 'book/**'
              - '!book/templates/course.html'
              - 'Makefile'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/static.yml'

      - name: Setup Pandoc
        uses: pandoc/actions/setup@main
        with:
          version: 3.7.0.2

      - name: Prepare TeX Live cache directory
        if: steps.changes.outputs.book != 'false'
        run: sudo mkdir -p /usr/local/texlive && sudo chown -R $(whoami) /usr/local/texlive

      - name: Cache TeX Live
        if: steps.changes.outputs.book != 'false'
        uses: actions/cache@v4
        id: cache-texlive
        with:
          path: /usr/local/texlive
          # Manual version: bump when changing the tlmgr package list below.
          # (Previously keyed on a hash of this file, which re-installed TeX
          # Live on every workflow edit.)
          key: texlive-macos-v1

      - name: Install brew dependencies
        run: |
          # brew update # (slow) uncomment this for minor version updates if needed to debug other issues
          brew install make
          brew install pandoc-crossref
          brew install poppler
          # Only install TeX if not cached (and skip entirely for course-only changes)
          if [ "${{ steps.changes.outputs.book }}" != "false" ] && [ "${{ steps.cache-texlive.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss - installing TeX Live..."
            brew install --cask basictex
            eval "$(/usr/libexec/path_helper)"
            sudo tlmgr update --self
            # Install pdflatex packages (comes with basictex, but ensure dependencies)
            sudo tlmgr install collection-fontsrecommended collection-latexextra standalone
          else
            echo "Cache hit - skipping TeX Live installation"
          fi

      - name: Set up LaTeX PATH
        if: steps.changes.outputs.book != 'false'
        run: |
          # Find the actual texlive bin directory (varies by year/arch)
          TEXLIVE_BIN=$(find /usr/local/texlive -type d -name "bin" -exec find {} -type d -name "*-darwin" \; 2>/dev/null | head -1)
          echo "Found TeX Live bin: $TEXLIVE_BIN"
          echo "$TEXLIVE_BIN" >> $GITHUB_PATH
          # Also add the standard symlink path in case it exists
          echo "/Library/TeX/texbin" >> $GITHUB_PATH

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Clean build directory
        run: |
          rm -rf build
          mkdir -p build/html

      - name: Build book (HTML, PDF, EPUB, Kindle)
        if: steps.changes.outputs.book != 'false'
        run: |
          make
          make files

      # Cloudflare Pages deploys are full-site snapshots, so the book artifacts
      # must exist in build/html even when we don't rebuild them. Reuse the
      # currently published ones.
      - name: Build site (course-only change, reuse published book artifacts)
        if: steps.changes.outputs.book == 'false'
        run: |
          make html
          make files
          mkdir -p build/html/rl-cheatsheet
          curl -fsSL https://rlhfbook.com/book.pdf -o build/html/book.pdf
          curl -fsSL https://rlhfbook.com/book.epub -o build/html/book.epub
          curl -fsSL https://rlhfbook.com/book.kindle.epub -o build/html/book.kindle.epub
          curl -fsSL https://rlhfbook.com/rl-cheatsheet/ -o build/html/rl-cheatsheet/index.html
          curl -fsSL https://rlhfbook.com/rl-cheatsheet/inside_cover_back.pdf -o build/html/rl-cheatsheet/inside_cover_back.pdf

      - name: Build teaching slides
        run: |
          uv sync --extra teach
          make teach

      - name: Build Pagefind search index
        run: npx --yes pagefind --site build/html --glob "c/**/*.html"

      - name: Deploy preview to Cloudflare Pages
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy build/html --project-name=rlhf-book --branch=${{ github.head_ref }}

      - name: Deploy production to Cloudflare Pages
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy build/html --project-name=rlhf-book

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
# To enable Cloudflare Pages deployment:
#
# 1. Create a Cloudflare Pages project:
#    - Go to Workers & Pages > Create application > Pages > Upload assets
#    - Project name: rlhf-book
#    - We deploy via GitHub Actions direct upload, not Cloudflare build images
#
# 2. Get your Cloudflare credentials:
#    - Account ID: Right sidebar in the Cloudflare dashboard overview
#    - API token: Create a token with Account > Cloudflare Pages > Edit
#
# 3. Add secrets to GitHub:
#    - Go to repo Settings > Secrets and variables > Actions
#    - Add CLOUDFLARE_ACCOUNT_ID
#    - Add CLOUDFLARE_API_TOKEN
#
# 4. Update DNS:
#    - In Cloudflare Pages: Custom domains > Set up a domain > rlhfbook.com
#    - If serving the apex domain, move the zone to Cloudflare nameservers
#    - If serving a subdomain only, point a CNAME at <project>.pages.dev
#
# =============================================================================
