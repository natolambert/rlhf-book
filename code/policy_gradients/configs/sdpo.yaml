data:
  size: 3000
  specs:
    - name: spell_backward
      weight: 1
      config:
        min_word_len: 3
        max_word_len: 10

loss: sdpo
model_name: Qwen/Qwen3-1.7B
clip_eps_lo: 0.2
clip_eps_hi: 0.2
beta: 0.0  # KL penalty coefficient (0 = disabled, set >0 to enable)
distillation_weight: 1.0
success_reward_threshold: 1.0  # accuracy reward = 1.0 when answer is correct
sdpo_teacher_ema_rate: 0.0  # set to 0.01 for a more paper-like regularized teacher if memory allows
sdpo_is_clip: 2.0
lr: 5e-6
temperature: 0.6
top_p: 0.95
top_k: 20
min_p: 0.0
max_new_tokens: 512
prompts_per_step: 4
num_rollouts: 8
rollout_batch_size: 8
train_batch_size: 2
batch_acc: 4
max_norm: 1.0
seed: 42
model_device_id: 0
wandb_project: rlhf-book
wandb_run_name: sdpo_spell_backwards
